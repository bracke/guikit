name = "guikit"
description = "App-independent Vulkan/GLFW GUI toolkit (draw, layout, widgets)"
version = "0.1.0-dev"

authors = ["Bent Bracke"]
maintainers = ["Bent Bracke <bent@bracke.dk>"]
maintainers-logins = ["bracke"]
licenses = "MIT OR Apache-2.0 WITH LLVM-exception"
website = "https://github.com/bracke/files"
tags = ["gui", "vulkan", "glfw"]

[[depends-on]]
gnat_native = "=15.2.1"

[[depends-on]]
df_vulkan = "~0.1.0"

[[depends-on]]
openglada_glfw = "~0.9.0"

[[depends-on]]
textrender = "*"

[[pins]]
textrender = { path = "../textrender" }

# Build dependencies in the development profile (-Og) too, not the default release
# (-O3). Alire only puts the *root* in development and leaves dependencies at -O3,
# which is a lot of optimisation for code we are only about to test -- and the
# profile lives in each crate's generated config gpr, so a root that disagrees with
# its neighbours silently forces a full rebuild of the shared ones. files and
# launcher already pin this; guikit is what they share, so it pins it too.
[build-profiles]
"*" = "development"
