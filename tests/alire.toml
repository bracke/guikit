name = "guikit_tests"
description = "Standalone testsuite for the guikit crate"
version = "0.1.0-dev"

authors = ["Bent Bracke"]
maintainers = ["Bent Bracke <bent@bracke.dk>"]
maintainers-logins = ["bracke"]
licenses = "MIT OR Apache-2.0 WITH LLVM-exception"
website = ""
tags = ["tests"]

executables = ["guikit_tests"]

[[depends-on]]
gnat_native = "=15.2.1"

[[depends-on]]
guikit = "*"

[[pins]]
guikit = { path = ".." }

[[depends-on]]
aunit = "^26.0.0"

# Same profile as the library root: see guikit's own alire.toml. A test run has no
# use for -O3, and disagreeing with the root would rebuild guikit from scratch.
[build-profiles]
"*" = "development"
